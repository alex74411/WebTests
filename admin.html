<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10大選品版位配置後台</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1e1e24; color: #fff; padding: 20px;
        }
        .admin-container {
            max-width: 800px; margin: 0 auto;
            background: #2b2b36; padding: 25px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-size: 22px; color: #4ecdc4; margin-bottom: 20px; text-align: center; }
        .tabs-wrapper {
            display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #444; padding-bottom: 10px;
        }
        .tab-btn {
            background: #3a3a4a; color: #ccc; border: none; padding: 10px 20px; 
            border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .tab-btn.active { background: #4ecdc4; color: #111; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .row-card {
            background: #22222b; padding: 15px; border-radius: 8px; margin-bottom: 15px;
            border-left: 4px solid #ff6b6b;
        }
        .row-card.iframe-style { border-left-color: #4ecdc4; }
        .row-title { font-size: 14px; font-weight: bold; color: #e0b88d; margin-bottom: 10px; }
        
        .form-flex { display: flex; gap: 10px; }
        .form-flex div { flex: 1; }
        
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; }
        input[type="text"], input[type="url"], textarea {
            width: 100%; padding: 8px; background: #15151a;
            border: 1px solid #444; border-radius: 4px; color: #fff; font-size: 13px;
        }
        textarea { height: 60px; font-family: monospace; }
        input:focus, textarea:focus { outline: none; border-color: #4ecdc4; }
        
        .save-bar {
            position: sticky; bottom: 0; background: #2b2b36; padding: 15px 0 0 0;
            border-top: 1px solid #444; margin-top: 20px;
        }
        .save-btn {
            display: block; width: 100%; background: #ff6b6b; color: #fff;
            border: none; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        .save-btn:hover { background: #ff5252; }
        
        #toast {
            display: none; background: #4ecdc4; color: #111;
            padding: 10px; text-align: center; border-radius: 6px; margin-top: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>⚙️ 10 大選品通路快速控制台</h1>
        
        <div class="tabs-wrapper">
            <button class="tab-btn active" onclick="switchTab('tab-links', this)">🔗 10個一般按鈕配置</button>
            <button class="tab-btn" onclick="switchTab('tab-iframes', this)">🛍️ 10個酷澎廣告配置</button>
        </div>

        <!-- 頁籤一：10 個按鈕產生器 -->
        <div id="tab-links" class="tab-content active"></div>

        <!-- 頁籤二：10 個酷澎廣告產生器 -->
        <div id="tab-iframes" class="tab-content"></div>

        <div class="save-bar">
            <button class="save-btn" onclick="saveMegaSettings()">儲存並發布更新</button>
            <div id="toast">✅ 成功保存 20 個配置點！請前往主頁查看。</div>
        </div>
    </div>

    <script>
        // 用 JS 自動產生 10 組表單控制項，免去複製貼上之苦
        const tabLinks = document.getElementById('tab-links');
        const tabIframes = document.getElementById('tab-iframes');

        // 產生 10 個一般按鈕表單
        for (let i = 1; i <= 10; i++) {
            tabLinks.innerHTML += `
                <div class="row-card">
                    <div class="row-title">位置 #${i} - 一般推薦按鈕</div>
                    <div class="form-flex">
                        <div>
                            <label>按鈕文字：</label>
                            <input type="text" id="link_title_${i}" placeholder="例如：👉 點我領取優惠">
                        </div>
                        <div>
                            <label>導購網址 (URL)：</label>
                            <input type="url" id="link_url_${i}" placeholder="https://...">
                        </div>
                    </div>
                </div>`;
        }

        // 產生 10 個 Iframe 表單
        for (let i = 1; i <= 10; i++) {
            tabIframes.innerHTML += `
                <div class="row-card iframe-style">
                    <div class="row-title">位置 #${i} - 酷澎廣告展示區</div>
                    <label>請貼上酷澎完整廣告代碼 (&lt;iframe ...&gt;&lt;/iframe&gt;)：</label>
                    <textarea id="iframe_code_${i}" placeholder="請貼上寬120 x 高240 的酷澎廣告代碼..."></textarea>
                </div>`;
        }

        // 頁籤切換邏輯
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // 預設資料
        const defaultData = {
            links: [
                { title: "👉 點我領取美妝專屬 85 折優惠券", url: "https://example.com/discount" },
                { title: "🤍 質感真皮包包 (免運賣場)", url: "https://example.com/bag" }
            ],
            iframes: [
                `<iframe src="https://coupa.ng/cmWukG" width="120" height="240" frameborder="0" scrolling="no" referrerpolicy="unsafe-url" browsingtopics></iframe>`
            ]
        };

        // 讀取並還原資料到 20 個表單欄位中
        function loadMegaSettings() {
            const savedData = JSON.parse(localStorage.getItem('kolMegaSettings')) || defaultData;
            
            for (let i = 1; i <= 10; i++) {
                const linkData = savedData.links && savedData.links[i-1] ? savedData.links[i-1] : { title: '', url: '' };
                document.getElementById(`link_title_${i}`).value = linkData.title || '';
                document.getElementById(`link_url_${i}`).value = linkData.url || '';
                
                const iframeCode = savedData.iframes && savedData.iframes[i-1] ? savedData.iframes[i-1] : '';
                document.getElementById(`iframe_code_${i}`).value = iframeCode || '';
            }
        }

        // 收集 20 個欄位打包存進儲存庫
        function saveMegaSettings() {
            const linksArray = [];
            const iframesArray = [];

            for (let i = 1; i <= 10; i++) {
                linksArray.push({
                    title: document.getElementById(`link_title_${i}`).value,
                    url: document.getElementById(`link_url_${i}`).value
                });
                iframesArray.push(document.getElementById(`iframe_code_${i}`).value);
            }

            const megaData = { links: linksArray, iframes: iframesArray };
            localStorage.setItem('kolMegaSettings', JSON.stringify(megaData));

            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        window.onload = loadMegaSettings;
    </script>
</body>
</html>
