<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chloé 柯蕾 - 精選美學選品店</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #faf6f0;
            color: #4a3f35;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            padding-bottom: 40px;
        }
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            background: linear-gradient(180deg, #f3ede4 0%, #ffffff 100%);
        }
        .avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        .name { font-size: 20px; font-weight: bold; color: #2b231c; }
        .bio { font-size: 13px; color: #8a7968; margin-top: 5px; }
        
        .section-title {
            font-size: 15px; font-weight: 600;
            padding-left: 15px; border-left: 4px solid #c49a70;
            margin: 25px 20px 15px;
        }

        /* 10個一般連結按鈕區區 */
        .links-container { padding: 0 20px; }
        .promo-btn {
            display: block;
            width: 100%;
            background: #2b231c;
            color: #fff;
            text-align: center;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 12px;
            transition: 0.2s;
            font-size: 14px;
        }
        .promo-btn:hover { background: #4a3f35; }

        /* 10個酷澎廣告網格區區 */
        .iframe-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
            flex-wrap: wrap;
        }
        .iframe-card {
            background: #fff;
            border: 1px solid #f3ede4;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }
        .iframe-title {
            font-size: 11px;
            color: #b0a190;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .footer { text-align: center; font-size: 11px; color: #b0a190; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=200&auto=format&fit=crop&q=80" class="avatar" alt="KOL Avatar">
            <div class="name">Chloé 柯蕾 ✨</div>
            <div class="bio">歡迎來到我的選品空間！下方為大家整理了 10 大推薦連結與酷澎直送好物。</div>
        </div>

        <!-- 一般限時特惠連結區 (最多顯示10個) -->
        <div class="section-title">🔥 粉絲獨家限量特惠通路</div>
        <div class="links-container" id="regular-links-area"></div>

        <!-- 酷澎直立式廣告區 (最多顯示10個) -->
        <div class="section-title">🛒 韓國大廠直送（酷澎今日嚴選）</div>
        <div class="iframe-grid" id="iframe-area"></div>

        <div class="footer">© 2026 Chloé Select. All Rights Reserved.</div>
    </div>

    <script>
        // 初始化預設測試資料
        const defaultData = {
            links: [
                { title: "👉 點我領取美妝專屬 85 折優惠券", url: "https://example.com/discount" },
                { title: "🤍 質感真皮包包 (免運賣場)", url: "https://example.com/bag" }
            ],
            iframes: [
                `<iframe src="https://coupa.ng/cmWukG" width="120" height="240" frameborder="0" scrolling="no" referrerpolicy="unsafe-url" browsingtopics></iframe>`
            ]
        };

        function renderPage() {
            const savedData = JSON.parse(localStorage.getItem('kolMegaSettings')) || defaultData;

            // 1. 渲染 10 個一般按鈕
            const linksArea = document.getElementById('regular-links-area');
            let linksHTML = '';
            if (savedData.links && savedData.links.length > 0) {
                savedData.links.forEach(item => {
                    if (item.title.trim() !== '' && item.url.trim() !== '') {
                        linksHTML += `<a href="${item.url}" target="_blank" class="promo-btn">${item.title}</a>`;
                    }
                });
            }
            linksArea.innerHTML = linksHTML || `<p style="text-align:center; color:#b0a190; font-size:13px;">暫無推薦連結</p>`;

            // 2. 渲染 10 個酷澎 iframe 廣告
            const iframeArea = document.getElementById('iframe-area');
            let iframeHTML = '';
            let count = 1;
            if (savedData.iframes && savedData.iframes.length > 0) {
                savedData.iframes.forEach(code => {
                    if (code && code.trim() !== '') {
                        iframeHTML += `
                            <div class="iframe-card">
                                <div class="iframe-title">嚴選好物 ${count}</div>
                                ${code}
                            </div>`;
                        count++;
                    }
                });
            }
            iframeArea.innerHTML = iframeHTML || `<p style="text-align:center; color:#b0a190; font-size:13px;">暫無酷澎廣告</p>`;
        }

        // 執行首次渲染與跨視窗監聽
        renderPage();
        window.addEventListener('storage', function(e) {
            if (e.key === 'kolMegaSettings') renderPage();
        });
    </script>
</body>
</html>
