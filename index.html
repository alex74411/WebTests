<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chloé 柯蕾 - 精選選品店</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #faf6f0;
            color: #4a3f35;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        /* 主區域最大寬度 770px */
        .container {
            width: 100%;
            max-width: 770px; 
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            padding-bottom: 40px;
        }
        
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            background: linear-gradient(180deg, #f3ede4 0%, #ffffff 100%);
        }
        .avatar {
            width: 100px; height: 100px; border-radius: 50%; object-fit: cover;
            border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px;
        }
        .name { font-size: 20px; font-weight: bold; color: #2b231c; }
        .bio { font-size: 13px; color: #8a7968; margin-top: 5px; }
        
        /* 大區塊標題 */
        .section-title {
            font-size: 15px; font-weight: 600; padding-left: 15px;
            border-left: 4px solid #c49a70; margin: 30px 20px 15px;
        }

        /* 配置來源標題樣式 */
        .item-slot-title {
            font-size: 11px; font-weight: bold; color: #c49a70;
            margin-bottom: 8px; letter-spacing: 0.5px; width: 100%;
            text-align: left; border-bottom: 1px dashed #f3ede4; padding-bottom: 4px;
        }

        /* 統一卡片外觀與防溢出橫向滾動 */
        .iframe-card, .html-wrapper-card, .js-wrapper-card, .preview-wrapper {
            background: #fff; border: 1px solid #ebdcd0; border-radius: 12px;
            padding: 14px; box-shadow: 0 4px 12px rgba(74, 63, 53, 0.02);
            width: 100%; display: block; text-align: center;
            position: relative; z-index: 1; overflow-x: auto; margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .iframe-stream, .html-container, .js-container, .preview-container { 
            padding: 0 20px; display: block; 
        }

        /* 確保廣告內容不被裁切 */
        .iframe-card iframe, .js-card iframe { 
            border-radius: 8px; margin: 5px auto 0; display: block;
            max-width: none !important; position: relative; z-index: 5;
        }

        /* 區塊二：純 HTML 區 */
        .html-card { width: 100%; display: block; margin-top: 5px; }
        .html-card img, .html-card iframe { max-width: 100% !important; height: auto !important; border-radius: 8px; }

        /* 區塊四：連結自動預覽牆 */
        .preview-card {
            display: flex; background: #faf6f0; border-radius: 10px; overflow: hidden; 
            text-decoration: none; margin-top: 5px; border: 1px solid #f3ede4;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .preview-card:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(196, 154, 112, 0.12); }
        .preview-img { width: 100px; min-width: 100px; height: 100px; background: #fff; }
        .preview-img img { width: 100%; height: 100%; object-fit: cover; }
        .preview-content { padding: 12px; display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1; min-width: 0; }
        .preview-title { font-size: 13px; font-weight: bold; color: #2b231c; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .preview-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
        .preview-domain { font-size: 11px; color: #b0a190; font-family: monospace; }
        .preview-btn { font-size: 10px; background: #c49a70; color: white; padding: 3px 8px; border-radius: 4px; font-weight: bold; }

        .footer { text-align: center; font-size: 11px; color: #b0a190; margin-top: 50px; padding-bottom: 20px; }
        .empty-hint { text-align: center; color: #b0a190; font-size: 12px; padding: 15px; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=200&auto=format&fit=crop&q=80" class="avatar" alt="Avatar">
            <div class="name">Chloé 柯蕾 ✨</div>
            <div class="bio">歡迎來到我的美學選品空間！動態智慧引擎已全面修復。</div>
        </div>

        <div class="section-title">🛒 酷澎嚴選動態組件</div>
        <div class="iframe-stream" id="main-iframe-area"></div>

        <div class="section-title">🖼️ 限時聯名特別企劃</div>
        <div class="html-container" id="main-html-area"></div>

        <div class="section-title">⚡ 智慧型 JS 動態廣告看板</div>
        <div class="js-container" id="main-js-area"></div>

        <div class="section-title">🛍️ 今日爆款推薦連結</div>
        <div class="preview-container" id="main-preview-area"></div>

        <div class="footer">© 2026 Chloé Select. All Rights Reserved.</div>
    </div>

    <script>
        // 初始化預設資料
        const defaultData = {
            iframes: [`<iframe src="https://ads-partners.tw.coupang.com/widgets.html?id=201&template=banner&trackingCode=AF6553800&subId=&width=728&height=90" width="728" height="90" frameborder="0" scrolling="no" referrerpolicy="unsafe-url" browsingtopics></iframe>`],
            htmls: [`<a href="https://coupa.ng/cm2mcA" target="_blank"><img src="https://ads-partners.tw.coupang.com/banners/193?w=600&h=900" style="width:100%"></a>`],
            jsAds: [`<script src="https://ads-partners.tw.coupang.com/g.js"><\/script>\n<script>\n\tnew PartnersCoupang.G({"id":201,"template":"banner","trackingCode":"AF6553800","width":"728","height":"90"});\n<\/script>`],
            links: [{
                url: "https://coupa.ng/cm4hWS",
                title: "🔥 酷澎爆款：韓系保濕亮白防曬乳液 (SPF50+)",
                img: "https://images.unsplash.com/photo-1556229174-5e42a09e45af?w=200"
            }]
        };

        function executeScripts(target, code) {
            target.innerHTML = code;
            Array.from(target.querySelectorAll("script")).forEach(oldScript => {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }

        // 🛠️ 智慧沙盒引擎：專門處理非同步載入的 JS 動態廣告看板
        function executeAdSandbox(target, code) {
            target.innerHTML = ''; 
            if (!code || code.trim() === '') return;

            let initialWidth = '100%';
            let initialHeight = '90px'; 
            
            const wMatch = code.match(/width=["']?(\d+)(px|%)?["']?/i) || code.match(/"width"\s*:\s*["']?(\d+)["']?/i);
            if (wMatch) initialWidth = wMatch[1] + (wMatch[2] || 'px');
            else if (code.includes('728')) initialWidth = '728px';

            const hMatch = code.match(/height=["']?(\d+)(px|%)?["']?/i) || code.match(/"height"\s*:\s*["']?(\d+)["']?/i);
            if (hMatch) initialHeight = hMatch[1] + 'px';

            const sandboxIframe = document.createElement('iframe');
            sandboxIframe.style.width = initialWidth;
            sandboxIframe.style.height = initialHeight; 
            sandboxIframe.style.border = 'none';
            sandboxIframe.style.overflow = 'hidden';
            sandboxIframe.style.display = 'block';
            sandboxIframe.style.margin = '0 auto';
            sandboxIframe.setAttribute('scrolling', 'no');

            target.appendChild(sandboxIframe);

            const doc = sandboxIframe.contentWindow.document;
            doc.open();
            doc.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <style>
                        body { margin: 0; padding: 0; background: transparent; text-align: center; display: block; overflow: hidden; }
                        iframe, img { max-width: none !important; }
                    </style>
                </head>
                <body>
                    <div id="ad-wrapper" style="display: inline-block; min-width: 10px; min-height: 10px;">
                        ${code}
                    </div>
                    <script>
                        function notifyResize() {
                            try {
                                const wrapper = document.getElementById('ad-wrapper');
                                const currentHeight = Math.max(
                                    document.body.scrollHeight, 
                                    document.documentElement.scrollHeight,
                                    wrapper ? wrapper.offsetHeight : 0
                                );
                                if (currentHeight > 10) {
                                    window.frameElement.style.height = (currentHeight + 4) + 'px';
                                }
                            } catch(e) {}
                        }
                        window.onload = function() {
                            notifyResize();
                            let count = 0;
                            const interval = setInterval(() => {
                                notifyResize();
                                count++;
                                if (count > 15) clearInterval(interval);
                            }, 300);
                        };
                        if (window.ResizeObserver) {
                            const observer = new ResizeObserver(() => notifyResize());
                            observer.observe(document.body);
                        }
                    <\/script>
                </body>
                </html>
            `);
            doc.close();
        }

        function renderEngine() {
            const data = JSON.parse(localStorage.getItem('kolFourBlocksSettings')) || defaultData;

            // 1. 🛒 渲染 iframe 區（單層扁平化解析：拒絕雙重 iframe 嵌套，徹底解放點擊跳轉）
            const iframeArea = document.getElementById('main-iframe-area');
            iframeArea.innerHTML = '';
            if (data.iframes && data.iframes.some(c => c.trim() !== '')) {
                data.iframes.forEach((code, idx) => {
                    if (code && code.trim() !== '') {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'iframe-card';
                        
                        let width = '728px';
                        let height = '90px';
                        let src = '';
                        
                        // 🎯 使用正則表達式精準抽離原始代碼中的參數
                        const srcMatch = code.match(/src=["']([^"']+)["']/i);
                        if (srcMatch) src = srcMatch[1];
                        
                        const wMatch = code.match(/width=["']?(\d+)(px|%)?["']?/i);
                        if (wMatch) width = wMatch[1] + (wMatch[2] || 'px');
                        
                        const hMatch = code.match(/height=["']?(\d+)(px|%)?["']?/i);
                        if (hMatch) height = hMatch[1] + 'px';
                        
                        // 直接生成單層原裝 iframe 嵌入主網頁，消除安全防禦所導致的點擊鎖死
                        wrapper.innerHTML = `
                            <div class="item-slot-title">iframe 欄位 #${idx + 1}</div>
                            <iframe src="${src}" width="${width}" height="${height}" 
                                    frameborder="0" scrolling="no" referrerpolicy="unsafe-url" browsingtopics 
                                    style="border:none; display:block; margin:5px auto 0; max-width:none !important; position:relative; z-index:5;">
                            </iframe>
                        `;
                        iframeArea.appendChild(wrapper);
                    }
                });
            } else {
                iframeArea.innerHTML = `<p class="empty-hint">暫無 iframe 組件</p>`;
            }

            // 2. 🖼️ 渲染 HTML 區
            const htmlArea = document.getElementById('main-html-area');
            htmlArea.innerHTML = '';
            if (data.htmls && data.htmls.some(c => c.trim() !== '')) {
                data.htmls.forEach((code, idx) => {
                    if (code && code.trim() !== '') {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'html-wrapper-card';
                        wrapper.innerHTML = `
                            <div class="item-slot-title">HTML / 廣告活動看板 #${idx + 1}</div>
                            <div class="html-card" id="html-slot-${idx}"></div>
                        `;
                        htmlArea.appendChild(wrapper);
                        executeScripts(document.getElementById(`html-slot-${idx}`), code);
                    }
                });
            } else {
                htmlArea.innerHTML = `<p class="empty-hint">暫無自訂 HTML 內容</p>`;
            }

            // 3. ⚡ 渲染 JS 廣告區（沿用高效動態沙盒引擎）
            const jsArea = document.getElementById('main-js-area');
            jsArea.innerHTML = '';
            if (data.jsAds && data.jsAds.some(c => c.trim() !== '')) {
                data.jsAds.forEach((code, idx) => {
                    if (code && code.trim() !== '') {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'js-wrapper-card';
                        wrapper.innerHTML = `
                            <div class="item-slot-title">JS 廣告活動看板 #${idx + 1}</div>
                            <div class="js-card" id="js-slot-${idx}"></div>
                        `;
                        jsArea.appendChild(wrapper);
                        
                        executeAdSandbox(document.getElementById(`js-slot-${idx}`), code);
                    }
                });
            } else {
                jsArea.innerHTML = `<p class="empty-hint">暫無 JS 動態廣告</p>`;
            }

            // 4. 🛍️ 渲染 智慧連結預覽區
            const previewArea = document.getElementById('main-preview-area');
            let previewHTML = '';
            if (data.links && data.links.some(item => item && item.url && item.url.trim() !== '')) {
                data.links.forEach((item, idx) => {
                    if (item && item.url && item.url.trim() !== '') {
                        const title = item.title.trim() || "點擊前往精選好物商品頁面";
                        const img = item.img.trim() || "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=200";
                        let domain = "coupa.ng";
                        try { if(item.url.includes('//')) domain = item.url.split('/')[2]; } catch(e){}

                        previewHTML += `
                            <div class="preview-wrapper">
                                <div class="item-slot-title">智慧連結預覽卡片 #${idx + 1}</div>
                                <a href="${item.url}" target="_blank" class="preview-card">
                                    <div class="preview-img"><img src="${img}" alt="Preview"></div>
                                    <div class="preview-content">
                                        <div class="preview-title">${title}</div>
                                        <div class="preview-meta">
                                            <span class="preview-domain">${domain}</span>
                                            <span class="preview-btn">查看詳情</span>
                                        </div>
                                    </div>
                                </a>
                            </div>`;
                    }
                });
                previewArea.innerHTML = previewHTML;
            } else {
                previewArea.innerHTML = `<p class="empty-hint">暫無推薦商品連結</p>`;
            }
        }

        renderEngine();
        window.addEventListener('storage', (e) => {
            if (e.key === 'kolFourBlocksSettings') renderEngine();
        });
    </script>
</body>
</html>
